# Default server.properties used when a template ships none. The orchestrator
# placeholders below are substituted at boot by orchestrator-overlay.sh, and
# server-port / rcon / online-mode are then enforced from env.
server-port=%serverPort%
server-ip=
motd=%serverName%
online-mode=false
enable-rcon=true
rcon.port=25575
enable-query=true
query.port=%serverPort%
max-players=20
view-distance=10
simulation-distance=10
spawn-protection=0
allow-flight=true
enable-command-block=true
sync-chunk-writes=false
network-compression-threshold=256
prevent-proxy-connections=false
